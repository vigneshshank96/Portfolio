<section id="projects">
    <div class="container">
        <h2>Projects</h2>
        <div class="grid" [@listAnimation]="data.length">
            <div class="card" *ngFor="let item of data">
                <h3>{{ item.title }}</h3>
                <p>{{ item.description }}</p>
                <div style="margin-top: 1rem;">
                    <span *ngFor="let tech of item.tech"
                        style="background: rgba(6, 182, 212, 0.1); color: var(--accent-color); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; display: inline-block; margin-bottom: 5px;">{{
                        tech }}</span>
                </div>
            </div>
        </div>
    </div>
</section>

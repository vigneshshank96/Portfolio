<section id="experience">
  <div class="container">
    <div class="section-head">
      <div class="section-eyebrow">
        <span class="num">04</span>
        <span class="dash"></span>
        Experience
      </div>
      <h2>Work History</h2>
    </div>
    <div class="experience-grid" [@timelineAnimation]="data.length">
      @for (item of data; track item; let i = $index) {
        <div class="experience-card" [@cardAnimation]>
          <div class="card-header">
            <div class="timeline-date">
              <i class="bi bi-calendar3"></i>
              {{ item.date }}
            </div>
            <h3>
              <i class="bi bi-briefcase"></i>
              {{ item.role }}
            </h3>
            <h4>
              <i class="bi bi-building"></i>
              {{ item.company }}
            </h4>
          </div>
          <ul class="experience-list">
            @for (point of getBulletPoints(item.description); track point) {
              <li>
                <i class="bi bi-arrow-right-circle bullet-icon"></i>
                <span class="bullet-text">{{ point }}</span>
              </li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>

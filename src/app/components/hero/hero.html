<section id="hero" class="hero" @fadeIn>
  <div class="container hero-content">
    <div class="hero-grid">
      <div class="hero-text">
        <div class="status-pill">
          <span class="dot"></span>
          Available for opportunities
        </div>
        <p class="hero-subtitle">Hello, I'm</p>
        <h1>Vignesh Sankar</h1>
        <p class="hero-description">DevOps Engineer | Cloud Infrastructure | Automation & Reliability</p>
        @if (data?.about) {
          <div class="about-preview">
            <p class="intro-text">{{ data?.about?.intro }}</p>
          </div>
        }
        <div class="hero-stats">
          <div class="cell">
            <span class="v">7+</span>
            <span class="k">Years Experience</span>
          </div>
          <div class="cell">
            <span class="v">3</span>
            <span class="k">Companies</span>
          </div>
          <div class="cell">
            <span class="v">3</span>
            <span class="k">Certifications</span>
          </div>
        </div>
        <div class="social-links">
          <a href="https://github.com/vigneshshank96" class="social-icon" target="_blank" rel="noopener noreferrer"><i class="bi bi-github"></i></a>
          <a href="https://www.linkedin.com/in/vignesh-sankar-b1aa77108/" class="social-icon" target="_blank" rel="noopener noreferrer"><i class="bi bi-linkedin"></i></a>
          <a href="mailto:vigneshshank96@zohomail.in" class="social-icon"><i class="bi bi-envelope"></i></a>
        </div>
      </div>
      <div class="profile-img-container">
        <img src="assets/images/dp.gif" alt="Minecraft Character" class="minecraft-character"
          id="minecraftChar">
      </div>
    </div>
  </div>
</section>

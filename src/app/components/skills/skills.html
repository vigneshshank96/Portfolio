<section id="skills" @fadeIn>
    <div class="container">
        <h2>Skills & Expertise</h2>
        <p class="section-subtitle">Technologies and tools I work with</p>

        <div class="skills-section" *ngIf="data">
            <!-- DevOps Skills -->
            <div class="skill-category-wrapper">
                <!-- <h3 class="category-title">DevOps Skills</h3> -->
                <div class="skills-grid" [@listAnimation]="data.devops.length">
                    <div class="skill-card" *ngFor="let skillCategory of data.devops">
                        <div class="skill-icon-wrapper">
                            <i class="bi" 
                               [ngClass]="getSkillIcon(skillCategory.category).icon"
                               [ngStyle]="{'color': getSkillIcon(skillCategory.category).color, 'font-size': '4rem'}"
                               class="skill-icon"></i>
                        </div>
                        <h4>{{ skillCategory.category }}</h4>
                        <div class="skill-items">
                            <span class="skill-badge" *ngFor="let item of skillCategory.items">{{ item }}</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Additional Technical Skills -->
            <!-- <div class="skill-category-wrapper">

    </div>
</section>

<section id="skills" @fadeIn>
  <div class="container">
    <div class="section-head">
      <div class="section-eyebrow">
        <span class="num">03</span>
        <span class="dash"></span>
        {{ 'SKILLS.EYEBROW' | translate }}
      </div>
      <h2>{{ 'SKILLS.HEADING' | translate }}</h2>
      <p class="section-subtitle">{{ 'SKILLS.SUBTITLE' | translate }}</p>
    </div>

    @if (data) {
      <div class="tech-grid" [@listAnimation]="data.devops.length">
        @for (skillCategory of data.devops; track skillCategory) {
          <div class="tech-cluster">
            <div class="t-head">
              <i class="bi"
                [ngClass]="getSkillIcon(skillCategory.category).icon"
              [ngStyle]="{'color': getSkillIcon(skillCategory.category).color}"></i>
              <span>{{ skillCategory.category }}</span>
            </div>
            <div class="t-items">
              @for (item of skillCategory.items; track item) {
                <span class="t-tag">{{ item }}</span>
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</section>

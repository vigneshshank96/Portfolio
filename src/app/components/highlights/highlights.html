<section id="industryKnowledge">
  <div class="container">
    <div class="section-head">
      <div class="section-eyebrow">
        <span class="num">02</span>
        <span class="dash"></span>
        {{ 'HIGHLIGHTS.EYEBROW' | translate }}
      </div>
      <h2>{{ 'HIGHLIGHTS.HEADING' | translate }}</h2>
    </div>
    <div class="bento-grid" [@listAnimation]="data.length">
      @for (item of data; track item; let i = $index) {
        <div class="bento"
          [class.feature]="i === 0"
          [class.compact]="i > 0">
          <i class="bi b-icon" [ngClass]="item.icon" [style.color]="item.color"></i>
          <div class="b-body">
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
